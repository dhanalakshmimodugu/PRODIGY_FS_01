<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h2>Dashboard</h2>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
            <div class="alert alert-{{category}}">{{msg}}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <p>Welcome, <strong>{{ username }}</strong> — role: <strong>{{ role }}</strong></p>
      <p>
        <a class="btn btn-outline-secondary" href="{{ url_for('logout') }}">Logout</a>
        <a class="btn btn-danger" href="{{ url_for('admin_panel') }}">Admin Panel</a>
        <a class="btn btn-primary" href="{{ url_for('index') }}">Home</a>
      </p>
    </div>
  </body>
</html>

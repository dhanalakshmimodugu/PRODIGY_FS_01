<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <h2>Admin Panel</h2>
      <table class="table table-striped">
        <thead>
          <tr><th>ID</th><th>Username</th><th>Role</th></tr>
        </thead>
        <tbody>
          {% for u in users %}
            <tr>
              <td>{{ u['id'] }}</td>
              <td>{{ u['username'] }}</td>
              <td>{{ u['role'] }}</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
      <p><a class="btn btn-secondary" href="{{ url_for('dashboard') }}">Back</a></p>
    </div>
  </body>
</html>
